name: Deploy to GCP Cloud Functions

on:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write # Required for Workload Identity Federation

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy Cloud Run Function
        run: |
          gcloud run deploy generate-site \
            --source=. \
            --function=GenerateSite \
            --region=${{ vars.GCP_REGION }} \
            --project=${{ vars.GCP_PROJECT_ID }} \
            --allow-unauthenticated \
            --set-env-vars "GITHUB_APP_ID=${{ secrets.GH_APP_ID }},GITHUB_APP_INSTALLATION_ID=${{ secrets.GH_APP_INSTALLATION_ID }},GITHUB_APP_PRIVATE_KEY=${{ secrets.GH_APP_PRIVATE_KEY }},GITHUB_ORG=${{ vars.GITHUB_ORG }},PAGES_BASE_DOMAIN=${{ vars.PAGES_BASE_DOMAIN }},CLOUDFLARE_API_TOKEN=${{ secrets.CLOUDFLARE_API_TOKEN }},CLOUDFLARE_ZONE_ID=${{ secrets.CLOUDFLARE_ZONE_ID }}"
